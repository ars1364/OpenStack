# Persist HAProxy VIPs on ens3 (single-node Kolla, no keepalived). Drop into /etc/netplan/.
# After copy: sudo chmod 0600 /etc/netplan/61-vips.yaml && sudo netplan apply
network:
  version: 2
  ethernets:
    ens3:
      addresses:
        - 95.156.253.232/27   # kolla_internal_vip_address
        - 95.156.253.235/27   # kolla_external_vip_address
